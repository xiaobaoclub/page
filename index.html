<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>小包社区最新地址发布页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 28px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      text-align: center;
      border: 1px solid #eef2f7;
    }
    .notice {
      font-size: 20px;
      font-weight: 600;
      color: #0b1b33;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }
    .sub-notice {
      font-size: 15px;
      color: #5a6f8c;
      margin-bottom: 24px;
      line-height: 1.5;
      border-bottom: 1px solid #eceff5;
      padding-bottom: 24px;
    }
    .url-box {
      background: #f2f6fd;
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 28px;
      word-break: break-all;
      border: 1px solid #dce5f2;
      font-size: 15px;
      color: #1a2c4a;
      font-weight: 500;
    }
    .url-box a {
      color: #1a5cdb;
      text-decoration: none;
    }
    .url-box a:hover {
      text-decoration: underline;
    }
    .countdown-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px 14px;
      background: #f8faff;
      border-radius: 60px;
      padding: 12px 18px;
      margin-bottom: 26px;
      border: 1px solid #e2eaf9;
      flex-wrap: wrap;
    }
    .countdown-number {
      font-size: 34px;
      font-weight: 700;
      color: #1e6df2;
      background: white;
      padding: 0 12px;
      border-radius: 40px;
      min-width: 60px;
      display: inline-block;
      line-height: 1.3;
      box-shadow: 0 2px 8px rgba(30, 109, 242, 0.08);
    }
    .countdown-label {
      font-size: 17px;
      color: #3a4e6b;
      font-weight: 400;
    }
    .btn {
      display: inline-block;
      background: #1e6df2;
      color: white;
      font-weight: 600;
      font-size: 17px;
      padding: 14px 40px;
      border-radius: 60px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(30, 109, 242, 0.2);
      letter-spacing: 0.3px;
      width: 100%;
      max-width: 280px;
    }
    .btn:hover {
      background: #1455d4;
      transform: scale(0.97);
    }
    .btn:active {
      background: #0d47b3;
      transform: scale(0.95);
    }
    .footnote {
      margin-top: 24px;
      font-size: 14px;
      color: #7a8ca5;
      border-top: 1px solid #eceff5;
      padding-top: 20px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footnote span {
      background: #f0f4fe;
      padding: 4px 16px;
      border-radius: 30px;
      color: #1e4b8a;
    }
    @media (max-width: 480px) {
      .card { padding: 28px 16px 24px; }
      .notice { font-size: 18px; }
      .url-box { font-size: 14px; }
      .countdown-number { font-size: 28px; min-width: 50px; }
      .btn { font-size: 16px; padding: 12px 20px; max-width: 100%; }
    }
    /* 暗色适配 */
    @media (prefers-color-scheme: dark) {
      body { background: #10161f; }
      .card { background: #1c2533; border-color: #2e3a4b; }
      .notice { color: #e6edf8; }
      .sub-notice { color: #b0c3db; border-bottom-color: #2e3a4b; }
      .url-box { background: #131d2b; border-color: #314257; color: #d6e3f5; }
      .url-box a { color: #7ca8ff; }
      .countdown-area { background: #182233; border-color: #2f4057; }
      .countdown-number { background: #1f2d44; color: #7ca8ff; box-shadow: 0 2px 8px rgba(0,20,40,0.6); }
      .countdown-label { color: #b8cce5; }
      .btn { background: #2b72f0; box-shadow: 0 8px 18px rgba(20,80,200,0.4); }
      .btn:hover { background: #1a5cdb; }
      .footnote { border-top-color: #2e3a4b; color: #9aafcb; }
      .footnote span { background: #1e2c40; color: #b0cbff; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="notice">即将跳转  预计 <span class="countdown-number" id="countdownDisplay">5</span> 秒 </div>

  <div class="url-box">
推荐使用谷歌(Chrome)浏览器访问本站，谷歌浏览器速度更快。<br>
如果您记不住本页域名，请收藏该发布页地址。<br>
遇到网站维护地址无法访问可以前往本页查看最新通知！ </div>

  <div class="url-box">
2026.7.16 服务器网络出现异常机房正在检查处理中，请稍后访问！ </div>


  <a href="https://xiaobaoclub.neuj65ny9zs.link/" id="manualBtn" class="btn">继续访问</a>

</div>

<script>
  (function() {
    const TARGET = "https://xiaobaoclub.neuj65ny9zs.link/";
    const COUNTDOWN_SECONDS = 5;
    let remaining = COUNTDOWN_SECONDS;

    const countdownEl = document.getElementById('countdownDisplay');
    const manualBtn = document.getElementById('manualBtn');
    const targetLink = document.getElementById('targetLink');

    // 更新显示
    function updateCountdown(value) {
      if (countdownEl) countdownEl.textContent = value;
    }

    // 跳转
    function redirect() {
      window.location.href = TARGET;
    }

    // 倒计时
    function startCountdown() {
      updateCountdown(remaining);
      if (remaining <= 0) { redirect(); return; }

      const timer = setInterval(function() {
        remaining -= 1;
        updateCountdown(remaining);
        if (remaining <= 0) {
          clearInterval(timer);
          redirect();
        }
      }, 1000);
    }

    // 初始化：确保链接正确
    if (targetLink) targetLink.href = TARGET;
    if (manualBtn) manualBtn.href = TARGET;

    // 启动倒计时
    startCountdown();

  })();
</script>
</body>
</html>
